<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2C3E50">
  <title>Flappy Bird</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐤</text></svg>">
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>

  <!-- 横屏提示 -->
  <div id="rotate-hint">
    <div class="rotate-icon">📱</div>
    <div>请旋转设备竖屏游玩</div>
  </div>

  <!-- 外层居中容器 -->
  <div id="wrapper">

  <!-- 游戏主容器 -->
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- 排行榜按钮 - 独立于界面外 -->
    <button id="leaderboard-btn" class="top-right-btn" type="button">🏆 排行榜</button>

    <!-- 开始界面 -->
    <div id="start-screen" class="overlay">
      <div class="start-content">
        <div class="title-bird-container">
          <svg class="title-bird" viewBox="0 0 34 26">
            <ellipse cx="17" cy="13" rx="17" ry="13" fill="#FFD54F"/>
            <ellipse cx="17" cy="16" rx="15" ry="10" fill="#FFC107"/>
            <circle cx="24" cy="8" r="8" fill="#FFFFFF"/>
            <circle cx="27" cy="9" r="4" fill="#333"/>
            <circle cx="28.5" cy="7" r="1.5" fill="#FFFFFF"/>
            <polygon points="31,11 38,13 31,17" fill="#FF6D00"/>
            <ellipse cx="10" cy="16" rx="10" ry="5" fill="#FFE082" transform="rotate(-15,10,16)"/>
          </svg>
        </div>
        <h1 class="start-title">Flappy Bird</h1>
        <p class="start-subtitle">经典飞行挑战</p>
        <div id="start-hint" class="start-hint">
          <span class="hint-icon">👆</span> 点击屏幕开始
        </div>
        <div class="start-instructions">
          📱 点击屏幕 &nbsp;|&nbsp; 🖥 空格键 / 鼠标<br>
          穿过管道即可得分
        </div>
      </div>
    </div>

    <!-- Game Over 界面 -->
    <div id="game-over-screen" class="overlay hidden">
      <div class="game-over-card">
        <div class="game-over-title">Game Over</div>

        <div class="score-display">
          <div class="score-block">
            <div class="score-label">本局分数</div>
            <div class="score-value" id="final-score">0</div>
          </div>
          <div class="score-block">
            <div class="score-label">最高纪录</div>
            <div class="score-value" id="best-score">0</div>
          </div>
        </div>

        <div id="new-best" class="new-best-badge hidden">🎉 新纪录!</div>

        <div class="nickname-section">
          <input
            type="text"
            id="nickname-input"
            class="nickname-input"
            placeholder="输入昵称上榜..."
            maxlength="12"
            autocomplete="off"
          >
        </div>

        <button id="submit-btn" class="btn btn-primary" type="button">提交分数</button>
        <button id="play-again-btn" class="btn btn-primary" type="button">再来一局</button>
        <button id="back-home-btn" class="btn btn-secondary" type="button">回到首页</button>
      </div>
    </div>

    <!-- 排行榜弹窗 -->
    <div id="leaderboard-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <div class="modal-header">
          <span class="modal-title">🏆 排行榜</span>
          <button id="close-leaderboard" class="modal-close" type="button">✕</button>
        </div>
        <div id="leaderboard-list" class="rank-list">
          <!-- JS 动态填充 -->
        </div>
        <div class="rank-footer">
          共 <span id="leaderboard-total">0</span> 位玩家上榜
        </div>
      </div>
    </div>
  </div>
  </div> <!-- /wrapper -->

  <!-- 游戏脚本（按依赖顺序加载） -->
  <script src="js/Audio.js?v=5"></script>
  <script src="js/Bird.js?v=5"></script>
  <script src="js/Pipe.js?v=5"></script>
  <script src="js/Background.js?v=5"></script>
  <script src="js/Particles.js?v=5"></script>
  <script src="js/Score.js?v=5"></script>
  <script src="js/Input.js?v=5"></script>
  <script src="js/API.js?v=5"></script>
  <script src="js/UI.js?v=5"></script>
  <script src="js/Game.js?v=5"></script>
  <script src="js/main.js?v=5"></script>
</body>
</html>
